{% extends "admin/base_site.html" %}
{% load static %}

{% block extrahead %}
{{ block.super }}
<style>
  :root {
    --primary: #2C3E2F;
    --secondary: #476E56;
    --accent: #D2A85E;
    --primary-fg: #fff;
    --body-bg: #f6f8f4;
    --body-fg: #2b2b2b;
    --link-fg: #2f6b4f;
    --link-selected-fg: #8e6a2d;
  }

  #header {
    background: linear-gradient(90deg, #2C3E2F, #476E56);
  }

  #branding h1,
  #branding h1 a:link,
  #branding h1 a:visited {
    color: #FAF8F5;
    font-weight: 700;
  }

  .module h2,
  .module caption,
  .inline-group h2 {
    background: #476E56;
  }

  div.breadcrumbs {
    background: #D2A85E;
    color: #2C3E2F;
  }

  .button,
  input[type=submit],
  input[type=button],
  .submit-row input,
  a.button {
    background: #476E56;
  }

  .button.default,
  input[type=submit].default,
  .submit-row input.default {
    background: #2C3E2F;
  }
</style>
{% endblock %}
